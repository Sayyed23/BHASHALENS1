type Mutation @aws_iam {
  addHistoryItem(sourceText: String!, sourceLang: String!, targetText: String!, targetLang: String!, timestamp: Int, type: String, backend: String, processingTime: Int): AWSJSON @aws_iam
  deleteHistoryItem(id: String!): AWSJSON @aws_iam
  saveTranslation(translation_id: String!, source_text: String!, source_lang: String!, translated_text: String!, target_lang: String!, tags: [String]): AWSJSON @aws_iam
  deleteSavedTranslation(id: String!): AWSJSON @aws_iam
  updatePreferences(preferences: AWSJSON!): AWSJSON @aws_iam
  exportData(exportType: String!, format: String!, startDate: String, endDate: String): AWSJSON @aws_iam
}

type Query @aws_iam {
  translate(source_text: String!, source_lang: String!, target_lang: String!, user_id: String): AWSJSON @aws_iam
  assist(request_type: String!, text: String!, language: String!, context: String, conversation_history: AWSJSON, user_id: String): AWSJSON @aws_iam
  simplify(text: String!, target_complexity: String!, language: String!, explain: Boolean, user_id: String): AWSJSON @aws_iam
  getHistory(page: Int, pageSize: Int, startDate: String, endDate: String): AWSJSON @aws_iam
  getSavedTranslations(page: Int, pageSize: Int, search: String): AWSJSON @aws_iam
  getPreferences: AWSJSON @aws_iam
}

input AmplifyAIConversationTurnErrorInput {
  errorType: String!
  message: String!
}

