version: 1
appRoot: bhashalens_app

frontend:
  phases:
    preBuild:
      commands:
        # Install Flutter SDK
        - if [ ! -d $HOME/flutter ]; then git clone https://github.com/flutter/flutter.git -b stable --depth 1 $HOME/flutter; fi
        - export PATH="$PATH:$HOME/flutter/bin"

        # Verify installation
        - flutter doctor

        # Enable web support
        - flutter config --enable-web

        # Clean previous builds to ensure fonts/icons are rebuilt
        - flutter clean

        # Create environment file
        - touch .env
        - |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
          echo "FIREBASE_ANDROID_API_KEY=$FIREBASE_ANDROID_API_KEY" >> .env
          echo "FIREBASE_ANDROID_APP_ID=$FIREBASE_ANDROID_APP_ID" >> .env
          echo "FIREBASE_ANDROID_MESSAGING_SENDER_ID=$FIREBASE_ANDROID_MESSAGING_SENDER_ID" >> .env
          echo "FIREBASE_ANDROID_PROJECT_ID=$FIREBASE_ANDROID_PROJECT_ID" >> .env
          echo "FIREBASE_ANDROID_STORAGE_BUCKET=$FIREBASE_ANDROID_STORAGE_BUCKET" >> .env
          echo "AWS_API_GATEWAY_URL=$GATEWAY_URL" >> .env
          echo "AWS_REGION=$APP_REGION" >> .env
          echo "AWS_ENABLE_CLOUD=$CLOUD_ENABLED" >> .env

        # Install dependencies
        - flutter pub get

    build:
      commands:
        # Build Flutter web with HTML renderer for better mobile icon/font support
        - flutter build web --release --no-tree-shake-icons --base-href / --web-renderer html

        # Verify that icon fonts and manifests exist
        - ls build/web/assets/fonts
        - ls build/web/FontManifest.json
        - ls build/web/AssetManifest.json

  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'

  cache:
    paths:
      - '$HOME/flutter'
      - '.dart_tool'
      - '/root/.pub-cache/**/*'