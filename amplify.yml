version: 1

env:
  variables:
    FLUTTER_VERSION: "3.24.5"

frontend:
  phases:
    preBuild:
      commands:
        # Save Amplify's starting directory (app root when Root directory is set)
        - pwd > .amplify_app_root

        # Install Flutter only if not cached
        - if [ ! -d "$HOME/flutter" ]; then git clone https://github.com/flutter/flutter.git $HOME/flutter; fi
        - cd $HOME/flutter
        - git fetch --tags
        - git checkout $FLUTTER_VERSION

        # Add Flutter to PATH
        - export PATH="$PATH:$HOME/flutter/bin"

        # Enable web support
        - flutter config --enable-web

        # Return to app root and enter bhashalens_app
        - cd $(cat .amplify_app_root)/bhashalens_app

        # Install dependencies
        - flutter pub get

        # Create environment file
        - rm -f .env
        - touch .env
        - echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
        - echo "FIREBASE_WEB_API_KEY=$FIREBASE_WEB_API_KEY" >> .env
        - echo "FIREBASE_WEB_APP_ID=$FIREBASE_WEB_APP_ID" >> .env
        - echo "FIREBASE_WEB_PROJECT_ID=$FIREBASE_WEB_PROJECT_ID" >> .env
        - echo "AWS_API_GATEWAY_URL=$AWS_API_GATEWAY_URL" >> .env
        - echo "AWS_REGION=$AWS_REGION" >> .env
        - echo "AWS_ENABLE_CLOUD=$AWS_ENABLE_CLOUD" >> .env

        # Copy SQLite web files (for sqflite_common_ffi_web)
        - mkdir -p web
        - find $HOME/.pub-cache -name "sqlite3.wasm" -exec cp {} web/ \; || echo "sqlite3.wasm missing"
        - find $HOME/.pub-cache -name "sqlite3.js" -exec cp {} web/ \; || echo "sqlite3.js missing"
        - find $HOME/.pub-cache -name "sqflite_sw.js" -exec cp {} web/ \; || echo "sqflite_sw.js missing"

    build:
      commands:
        - cd $(cat .amplify_app_root)/bhashalens_app
        # Build Flutter Web (stable for icons & fonts)
        - flutter build web --release --web-renderer html --no-tree-shake-icons --pwa-strategy=none
        # Verify output
        - ls build/web
        - ls build/web/assets || echo "Assets folder missing"

  artifacts:
    baseDirectory: bhashalens_app/build/web
    files:
      - '**/*'

  cache:
    paths:
      - $HOME/flutter
      - $HOME/.pub-cache
      - .dart_tool
