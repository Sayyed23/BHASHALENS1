version: 1
backend:
  phases:
    build:
      commands:
        - cd bhashalens_app
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - cd bhashalens_app
        - flutter pub get
        - flutter build web --release
  artifacts:
    baseDirectory: bhashalens_app/build/web
    files:
      - '**/*'
  cache:
    paths:
      - bhashalens_app/.npm/**/*
