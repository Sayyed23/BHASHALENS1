version: 1
backend:
  phases:
    build:
      commands:
        - npm ci
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
env:
  variables:
    FLUTTER_VERSION: "3.41.3"

frontend:
  phases:
    preBuild:
      commands:
        # 1. Install Flutter efficiently
        - 'if [ ! -d "$HOME/flutter" ]; then git clone --depth 1 --branch $FLUTTER_VERSION https://github.com/flutter/flutter.git $HOME/flutter; fi'
        - 'export PATH="$PATH:$HOME/flutter/bin"'
        - 'flutter config --enable-web --no-analytics'
        - 'flutter doctor -v'

        # 2. Setup project environment with robust path handling
        - 'export APP_DIR="bhashalens_app"'
        - 'if [ "$(basename $(pwd))" = "bhashalens_app" ]; then export APP_DIR="."; fi'
        - 'echo "GEMINI_API_KEY=$GEMINI_API_KEY" > $APP_DIR/.env'
        - 'echo "FIREBASE_WEB_API_KEY=$FIREBASE_WEB_API_KEY" >> $APP_DIR/.env'
        - 'echo "FIREBASE_WEB_APP_ID=$FIREBASE_WEB_APP_ID" >> $APP_DIR/.env'
        - 'echo "FIREBASE_WEB_PROJECT_ID=$FIREBASE_WEB_PROJECT_ID" >> $APP_DIR/.env'
        - 'echo "AWS_API_GATEWAY_URL=$AWS_API_GATEWAY_URL" >> $APP_DIR/.env'
        - 'echo "AWS_REGION=$AWS_REGION" >> $APP_DIR/.env'
        - 'echo "AWS_ENABLE_CLOUD=$AWS_ENABLE_CLOUD" >> $APP_DIR/.env'
        - 'ls -l $APP_DIR/.env'
        - 'if [ -f "amplify_outputs.json" ]; then cp amplify_outputs.json $APP_DIR/lib/amplify_outputs.json; elif [ -f "../amplify_outputs.json" ]; then cp ../amplify_outputs.json $APP_DIR/lib/amplify_outputs.json; else echo "Warning: amplify_outputs.json not found"; fi'

        # 3. Install dependencies and provision SQLite assets
        - 'cd $APP_DIR && flutter clean'
        - 'cd $APP_DIR && flutter pub get'
        - 'cd $APP_DIR && dart run sqflite_common_ffi_web:setup'
        - 'ls -l $APP_DIR/web/'

    build:
      commands:
        - 'export PATH="$PATH:$HOME/flutter/bin"'
        - 'export APP_DIR="bhashalens_app"'
        - 'if [ "$(basename $(pwd))" = "bhashalens_app" ]; then export APP_DIR="."; fi'
        # Build Flutter Web with optimizations for Flutter 3.41.3
        - 'cd $APP_DIR && flutter build web --release --no-tree-shake-icons'
        
        # Verify icon fonts are present in build output
        - 'ls -l $APP_DIR/build/web/assets/fonts/MaterialIcons-Regular.otf || echo "CRITICAL: MaterialIcons font MISSING"'
        - 'ls -l $APP_DIR/build/web/assets/packages/cupertino_icons/assets/CupertinoIcons.ttf || echo "WARNING: CupertinoIcons font MISSING"'

        # Final verification
        - "ls -l $APP_DIR/build/web/assets/.env || echo 'WARNING: .env not found in build output'"
        - 'ls -l $APP_DIR/build/web/index.html'

  artifacts:
    baseDirectory: bhashalens_app/build/web
    files:
      - '**/*'

  cache:
    paths:
      - '$HOME/flutter'
      - '$HOME/.pub-cache'
      - 'bhashalens_app/.dart_tool'
