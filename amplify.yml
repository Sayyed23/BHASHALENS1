version: 1

env:
  variables:
    FLUTTER_VERSION: "3.27.1"

frontend:
  phases:
    preBuild:
      commands:
        # Save Amplify's starting directory
        - export AMPLIFY_APP_ROOT=$(pwd)

        # 1. Create environment file IMMEDIATELY (Fixes "No file found for asset: .env")
        - cd $AMPLIFY_APP_ROOT/bhashalens_app
        - echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
        - echo "FIREBASE_WEB_API_KEY=$FIREBASE_WEB_API_KEY" >> .env
        - echo "FIREBASE_WEB_APP_ID=$FIREBASE_WEB_APP_ID" >> .env
        - echo "FIREBASE_WEB_PROJECT_ID=$FIREBASE_WEB_PROJECT_ID" >> .env
        - echo "AWS_API_GATEWAY_URL=$AWS_API_GATEWAY_URL" >> .env
        - echo "AWS_REGION=$AWS_REGION" >> .env
        - echo "AWS_ENABLE_CLOUD=$AWS_ENABLE_CLOUD" >> .env
        - 'echo "VERIFIED: .env created at $(pwd)/.env"'
        - ls -l .env

        # 2. Install Flutter efficiently (Shallow clone saves ~10 mins)
        - if [ ! -d "$HOME/flutter" ]; then git clone --depth 1 --branch $FLUTTER_VERSION https://github.com/flutter/flutter.git $HOME/flutter; fi
        - export PATH="$PATH:$HOME/flutter/bin"
        - flutter config --enable-web --no-analytics
        - flutter doctor -v

        # 3. Install dependencies
        - flutter pub get

        # 4. Copy SQLite web files (Optimized search)
        - mkdir -p web
        - PKG_DIR=$(find $HOME/.pub-cache -name "sqflite_common_ffi_web-*" -type d -print -quit)
        - 'echo "Copying SQLite assets from $PKG_DIR"'
        - cp $PKG_DIR/lib/src/web/sqlite3.wasm web/ || find $HOME/.pub-cache -name "sqlite3.wasm" -exec cp {} web/ \;
        - cp $PKG_DIR/lib/src/web/sqlite3.js web/ || find $HOME/.pub-cache -name "sqlite3.js" -exec cp {} web/ \;
        - cp $PKG_DIR/lib/src/web/sqflite_sw.js web/ || find $HOME/.pub-cache -name "sqflite_sw.js" -exec cp {} web/ \;

    build:
      commands:
        - cd $AMPLIFY_APP_ROOT/bhashalens_app
        # Build Flutter Web with optimizations
        - flutter build web --release --web-renderer html --no-tree-shake-icons --pwa-strategy=none --no-wasm-dry-run
        # Final verification
        - "ls -l build/web/assets/.env || echo 'WARNING: .env not found in build output'"
        - ls -l build/web/index.html



  artifacts:
    baseDirectory: bhashalens_app/build/web
    files:
      - '**/*'

  cache:
    paths:
      - $HOME/flutter
      - $HOME/.pub-cache
      - .dart_tool
