version: 1
appRoot: bhashalens_app

frontend:
  phases:
    preBuild:
      commands:
        # Install Flutter SDK if not cached
        - if [ ! -d /root/flutter ]; then git clone https://github.com/flutter/flutter.git -b stable --depth 1 /root/flutter; fi
        - export PATH="$PATH:/root/flutter/bin"

        # Download only web-related binaries
        - flutter precache --web

        # Enable web support
        - flutter config --enable-web

        # Clean only if necessary
        - flutter clean

        # Create environment file and verify variables
        - touch .env
        - |
          echo "GATEWAY_URL: ${GATEWAY_URL:+set}"
          echo "APP_REGION: ${APP_REGION:+set}"
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
          echo "FIREBASE_ANDROID_API_KEY=$FIREBASE_ANDROID_API_KEY" >> .env
          echo "FIREBASE_ANDROID_APP_ID=$FIREBASE_ANDROID_APP_ID" >> .env
          echo "FIREBASE_ANDROID_MESSAGING_SENDER_ID=$FIREBASE_ANDROID_MESSAGING_SENDER_ID" >> .env
          echo "FIREBASE_ANDROID_PROJECT_ID=$FIREBASE_ANDROID_PROJECT_ID" >> .env
          echo "FIREBASE_ANDROID_STORAGE_BUCKET=$FIREBASE_ANDROID_STORAGE_BUCKET" >> .env
          echo "AWS_API_GATEWAY_URL=$GATEWAY_URL" >> .env
          echo "AWS_REGION=$APP_REGION" >> .env
          echo "AWS_ENABLE_CLOUD=$CLOUD_ENABLED" >> .env

        # Install dependencies
        - flutter pub get

    build:
      commands:
        # Build Flutter web with HTML renderer
        - flutter build web --release --no-tree-shake-icons --base-href / --web-renderer html

        # Verify build output
        - ls -R build/web/assets || echo "No assets"
        - ls build/web/FontManifest.json || echo "No FontManifest"

  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'

  cache:
    paths:
      - '/root/flutter/**/*'
      - '/root/.pub-cache/**/*'
      - 'bhashalens_app/.dart_tool/**/*'